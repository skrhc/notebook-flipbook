<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .flipbook-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        .book {
            position: relative;
            width: 90%;
            max-width: 1400px;
            height: 90vh;
            display: flex;
            gap: 2px;
        }

        .page {
            flex: 1;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(255,255,255,0.95);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        button {
            background: #000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        button:hover {
            background: #333;
            transform: scale(1.05);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: scale(1);
        }

        .page-number {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            min-width: 100px;
            text-align: center;
        }

        /* Click zones for navigation */
        .click-left, .click-right {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        .click-left {
            left: 0;
        }

        .click-right {
            right: 0;
        }

        .click-left:hover {
            cursor: w-resize;
        }

        .click-right:hover {
            cursor: e-resize;
        }
    </style>
</head>
<body>
    <div class="flipbook-container">
        <div class="book">
            <div class="click-left"></div>
            <div class="page" id="page-left">
                <img id="img-left" src="" alt="Left page">
            </div>
            <div class="page" id="page-right">
                <img id="img-right" src="" alt="Right page">
            </div>
            <div class="click-right"></div>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn">← Previous</button>
        <span class="page-number" id="page-num">Pages 1-2 of 110</span>
        <button id="next-btn">Next →</button>
    </div>

    <script>
        const totalPages = 110;
        let currentPage = 1;

        const imgLeft = document.getElementById('img-left');
        const imgRight = document.getElementById('img-right');
        const pageNum = document.getElementById('page-num');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const clickLeft = document.querySelector('.click-left');
        const clickRight = document.querySelector('.click-right');

        function padNumber(num) {
            return String(num).padStart(3, '0');
        }

        function updatePages() {
            const leftPage = currentPage;
            const rightPage = currentPage + 1;

            imgLeft.src = `book/page-${padNumber(leftPage)}.jpg`;
            
            if (rightPage <= totalPages) {
                imgRight.src = `book/page-${padNumber(rightPage)}.jpg`;
                imgRight.style.display = 'block';
            } else {
                imgRight.style.display = 'none';
            }

            if (rightPage <= totalPages) {
                pageNum.textContent = `Pages ${leftPage}-${rightPage} of ${totalPages}`;
            } else {
                pageNum.textContent = `Page ${leftPage} of ${totalPages}`;
            }

            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages - 1;
        }

        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage += 2;
                updatePages();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage -= 2;
                updatePages();
            }
        }

        // Event listeners
        nextBtn.addEventListener('click', nextPage);
        prevBtn.addEventListener('click', prevPage);
        clickRight.addEventListener('click', nextPage);
        clickLeft.addEventListener('click', prevPage);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        // Initialize
        updatePages();
    </script>
</body>
</html>
