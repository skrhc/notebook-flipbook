<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #flipbook-container {
            width: 90vw;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flipbook {
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            margin: auto;
        }

        .page {
            background: white;
            display: none;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .page.hard {
            background: #2c2c2c;
        }
    </style>
</head>
<body>
    <div id="flipbook-container">
        <div id="flipbook"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://raw.githack.com/blasten/turn.js/master/turn.min.js"></script>
    
    <script>
        $(window).on('load', function() {
            const totalPages = 110;
            const flipbook = $('#flipbook');

            // Add pages
            for (let i = 1; i <= totalPages; i++) {
                const pageClass = i === 1 ? 'page hard' : 'page';
                flipbook.append(`
                    <div class="${pageClass}">
                        <img src="book/page-${String(i).padStart(4, '0')}.jpg">
                    </div>
                `);
            }

            // Responsive sizing
            const maxHeight = window.innerHeight * 0.85;
            const pageHeight = maxHeight;
            const pageWidth = (pageHeight * 1125) / 1754;

            setTimeout(function() {
                flipbook.turn({
                    width: pageWidth * 2,
                    height: pageHeight,
                    autoCenter: true,
                    elevation: 50,
                    gradients: true,
                    duration: 800,
                    display: 'double',
                    acceleration: true
                });

                // Keyboard nav
                $(document).keydown(function(e) {
                    if (e.keyCode == 37) flipbook.turn('previous');
                    if (e.keyCode == 39) flipbook.turn('next');
                });
            }, 100);
        });
    </script>
</body>
</html>
