<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #flipbook-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flipbook {
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
        }

        .page {
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Hard cover */
        .page.hard {
            background: #2c2c2c;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="flipbook-container">
        <div id="flipbook"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turn.js@4.1.0/turn.min.js?v=2"></script>
    
    <script>
    $(window).on('load', function() {
        const totalPages = 110;
        const flipbook = $('#flipbook');

        // Add all pages
        for (let i = 1; i <= totalPages; i++) {
            const pageClass = i === 1 ? 'page hard' : 'page';
            flipbook.append(`
                <div class="${pageClass}">
                    <img src="book/page-${String(i).padStart(4, '0')}.jpg" alt="Page ${i}">
                </div>
            `);
        }

        // Calculate dimensions to fit screen
        const windowHeight = $(window).height() * 0.85;
        const pageHeight = windowHeight;
        const pageWidth = (pageHeight / 1754) * 1125;

        // Initialize turn.js
        flipbook.turn({
            width: pageWidth * 2,
            height: pageHeight,
            autoCenter: true,
            elevation: 50,
            gradients: true,
            duration: 1000,
            acceleration: true,
            display: 'double',
            when: {
                turned: function(event, page) {
                    console.log('Current page:', page);
                }
            }
        });

        // Keyboard navigation
        $(document).keydown(function(e) {
            if (e.keyCode == 37) {
                flipbook.turn('previous');
            }
            if (e.keyCode == 39) {
                flipbook.turn('next');
            }
        });
    });
</script>
</body>
</html>
